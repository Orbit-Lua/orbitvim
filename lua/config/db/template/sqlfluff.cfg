# Override the dialect per file with a first-line directive, for example:
# -- sqlfluff:dialect:postgres

[sqlfluff]
dialect = tsql
encoding = utf-8
templater = raw
max_line_length = 120
max_parse_depth = 512
# Preserve database object casing, including on case-sensitive collations.
exclude_rules = CP02

# avoid auto-fixing unparsable files, as this can lead to unexpected results
rules = layout, capitalisation
fix_even_unparsable = false

[sqlfluff:indentation]
indent_unit = space
tab_space_size = 4
implicit_indents = allow
indented_joins = false
indented_using_on = false

[sqlfluff:layout:type:comma]
spacing_before = touch
line_position = trailing

[sqlfluff:layout:type:from_clause]
line_position = leading:strict

[sqlfluff:layout:type:join_clause]
line_position = leading:strict

[sqlfluff:layout:type:where_clause]
line_position = leading:strict
keyword_line_position = leading

[sqlfluff:layout:type:groupby_clause]
line_position = leading:strict
keyword_line_position = leading

[sqlfluff:layout:type:orderby_clause]
line_position = leading:strict
keyword_line_position = leading

[sqlfluff:layout:type:having_clause]
line_position = leading:strict
keyword_line_position = leading

[sqlfluff:rules:capitalisation.keywords]
capitalisation_policy = upper

[sqlfluff:rules:capitalisation.functions]
extended_capitalisation_policy = upper

[sqlfluff:rules:capitalisation.literals]
capitalisation_policy = upper

[sqlfluff:rules:capitalisation.types]
extended_capitalisation_policy = upper

[sqlfluff:rules:layout.long_lines]
ignore_comment_lines = true
